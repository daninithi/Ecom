services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: ecommerce-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: ecommerce-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  postgres:
    image: postgres:16
    container_name: ecommerce-postgres
    environment:
      POSTGRES_USER: myapp
      POSTGRES_PASSWORD: 123456789
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myapp -d ecommerce_db || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  discovery-server:
    build:
      context: .
      dockerfile: discovery-server/Dockerfile
    container_name: ecommerce-discovery-server
    ports:
      - "8761:8761"

  product:
    build:
      context: .
      dockerfile: product/Dockerfile
    container_name: ecommerce-product
    depends_on:
      - discovery-server
      - kafka
    environment:
      # Only override environment-specific values
      EUREKA_SERVER_URL: http://discovery-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/product_db
      SPRING_DATASOURCE_USERNAME: myapp
      SPRING_DATASOURCE_PASSWORD: 123456789
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    ports:
      - "8081:8081"

  order:
    build:
      context: .
      dockerfile: order/Dockerfile
    container_name: ecommerce-order
    depends_on:
      - discovery-server
      - kafka
    environment:
      # Only override environment-specific values
      EUREKA_SERVER_URL: http://discovery-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/order_db
      SPRING_DATASOURCE_USERNAME: myapp
      SPRING_DATASOURCE_PASSWORD: 123456789
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    ports:
      - "8082:8082"

  inventory:
    build:
      context: .
      dockerfile: inventory/Dockerfile
    container_name: ecommerce-inventory
    depends_on:
      - discovery-server
      - kafka
    environment:
      # Only override environment-specific values
      EUREKA_SERVER_URL: http://discovery-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/inventory_db
      SPRING_DATASOURCE_USERNAME: myapp
      SPRING_DATASOURCE_PASSWORD: 123456789
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    ports:
      - "8083:8083"

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: ecommerce-api-gateway
    depends_on:
      discovery-server:
        condition: service_started
      product:
        condition: service_started
      order:
        condition: service_started
      inventory:
        condition: service_started
    environment:
      EUREKA_SERVER_URL: http://discovery-server:8761/eureka/
    ports:
      - "8080:8080"

volumes:
  postgres-data:
